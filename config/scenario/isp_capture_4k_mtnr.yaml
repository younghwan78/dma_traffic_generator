scenario:
  name: ISP_capture_4K_MTNR
  duration_ns: 40000000
  frame_count: 1
ips:
  - name: BYRP0
    hw: byrp_v1.yaml
    ports:
      - name: COUT0
        width: 3840
        height: 2160
        format: BAYER_12BIT
    dmas:
      - name: RDMA_IN
        base_dva: 0x110000000
        width: 3840
        height: 2160
        format: BAYER_12BIT
        stride_byte: 6144
        start_ns: 0
      - name: WDMA_BYR
        base_dva: 0x120000000
        width: 3840
        height: 2160
        format: BAYER_12BIT
        stride_byte: 6144
        start_ns: 250
      - name: WDMA_STAT
        base_dva: 0x128000000
        width: 40
        height: 30
        format: STAT
        bitwidth: 16
        grid_width: 96
        grid_height: 72
        start_ns: 500
  - name: RGBP0
    hw: rgbp_v1.yaml
    timing_input_port: CIN0
    ports:
      - name: CIN0
        width: 3840
        height: 2160
        format: BAYER_12BIT
      - name: COUT0
        width: 3840
        height: 2160
        format: YUV444_12BIT
    start_condition:
      policy: all
      inputs:
        - RGBP0.CIN0
    dmas:
      - name: WDMA_OUT
        base_dva: 0x220000000
        width: 3840
        height: 2160
        format: YUV444_12BIT
        stride_byte: 23040
        start_ns: 0
  - name: MTNR0
    hw: mtnr_v1.yaml
    start_condition:
      policy: all
      inputs:
        - MTNR0.RDMA_CUR
    dmas:
      - name: RDMA_CUR
        base_dva: 0x230000000
        width: 3840
        height: 2160
        format: YUV444_12BIT
        stride_byte: 23040
        mtnr_role: current
        start_ns: 0
      - name: RDMA_PREV_L0
        base_dva: 0x240000000
        width: 3840
        height: 2160
        format: YUV444_12BIT
        stride_byte: 23040
        mtnr_role: previous
        pyramid_level: 0
        start_ns: 0
      - name: RDMA_PREV_L1
        base_dva: 0x250000000
        width: 1920
        height: 1080
        format: YUV444_12BIT
        stride_byte: 11520
        mtnr_role: previous
        pyramid_level: 1
        start_ns: 0
      - name: RDMA_PREV_L2
        base_dva: 0x258000000
        width: 960
        height: 540
        format: YUV444_12BIT
        stride_byte: 5760
        mtnr_role: previous
        pyramid_level: 2
        start_ns: 0
      - name: RDMA_PREV_L3
        base_dva: 0x25C000000
        width: 480
        height: 270
        format: YUV444_12BIT
        stride_byte: 2880
        mtnr_role: previous
        pyramid_level: 3
        start_ns: 0
      - name: RDMA_PREV_L4
        base_dva: 0x25E000000
        width: 240
        height: 135
        format: YUV444_12BIT
        stride_byte: 1472
        mtnr_role: previous
        pyramid_level: 4
        start_ns: 0
      - name: WDMA_OUT_L0
        base_dva: 0x260000000
        width: 3840
        height: 2160
        format: YUV444_12BIT
        stride_byte: 23040
        mtnr_role: output
        pyramid_level: 0
        start_ns: 300
      - name: WDMA_OUT_L1
        base_dva: 0x270000000
        width: 1920
        height: 1080
        format: YUV444_12BIT
        stride_byte: 11520
        mtnr_role: output
        pyramid_level: 1
        start_ns: 300
      - name: WDMA_OUT_L2
        base_dva: 0x278000000
        width: 960
        height: 540
        format: YUV444_12BIT
        stride_byte: 5760
        mtnr_role: output
        pyramid_level: 2
        start_ns: 300
      - name: WDMA_OUT_L3
        base_dva: 0x27C000000
        width: 480
        height: 270
        format: YUV444_12BIT
        stride_byte: 2880
        mtnr_role: output
        pyramid_level: 3
        start_ns: 300
      - name: WDMA_OUT_L4
        base_dva: 0x27E000000
        width: 240
        height: 135
        format: YUV444_12BIT
        stride_byte: 1472
        mtnr_role: output
        pyramid_level: 4
        start_ns: 300
  - name: YUVP0
    hw: yuvp_v1.yaml
    start_condition:
      policy: all
      inputs:
        - YUVP0.RDMA_IN
    dmas:
      - name: RDMA_IN
        base_dva: 0x320000000
        width: 3840
        height: 2160
        format: YUV444_12BIT
        stride_byte: 23040
        start_ns: 0
      - name: WDMA_NR
        base_dva: 0x330000000
        width: 3840
        height: 2160
        format: YUV420_10BIT
        stride_byte: 6144
        sbwc: true
        sbwc_align_byte: 64
        comp_ratio: 0.5
        start_ns: 200
links:
  - from: BYRP0.COUT0
    to: RGBP0.CIN0
    type: otf
  - from: RGBP0.WDMA_OUT
    to: MTNR0.RDMA_CUR
    type: m2m
    delta_ns: 0
  - from: MTNR0.WDMA_OUT_L0
    to: YUVP0.RDMA_IN
    type: m2m
    delta_ns: 0
